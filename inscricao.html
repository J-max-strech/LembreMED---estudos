<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - LembreMED</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card animate-fade" style="max-width: 550px;">
        <div class="auth-header">
            <h1>Criar Conta</h1>
            <p>Comece a organizar sua saúde agora.</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" class="form-control" placeholder="Seu nome" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>

            <div class="form-group">
                <label>Você é:</label>
                <div class="role-group">
                    <label class="role-box">
                        <input type="radio" name="role" value="paciente" checked>
                        <span>Paciente</span>
                    </label>
                    <label class="role-box">
                        <input type="radio" name="role" value="cuidador">
                        <span>Cuidador</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-large">Criar Conta</button>
        </form>

        <div class="auth-footer" style="text-align: center; margin-top: 1.5rem;">
            <p>Já tem uma conta? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Faça login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            
            const user = { nome, email, role };
            localStorage.setItem('lembremed_user', JSON.stringify(user));
            localStorage.setItem('lembremed_logged', 'true');
            
            // Initialize storage keys if they don't exist
            if (!localStorage.getItem('lembremed_meds')) {
                localStorage.setItem('lembremed_meds', JSON.stringify([]));
            }
            if (!localStorage.getItem('lembremed_patients')) {
                localStorage.setItem('lembremed_patients', JSON.stringify([
                    { name: 'Exemplo: José Silva', condition: 'Hipertensão', adherence: 85 }
                ]));
            }
            
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
