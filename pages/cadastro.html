<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - LembreMED</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card animate-fade" style="max-width: 550px;">
        <div class="auth-header">
            <h1>Começar Agora</h1>
            <p>Sua saúde organizada em um só lugar.</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label for="nome">Seu Nome Completo</label>
                <input type="text" id="nome" class="form-control" placeholder="Como você quer ser chamado?" required>
            </div>

            <div class="form-group">
                <label for="email">Seu Melhor E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Crie uma Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>

            <div class="form-group">
                <label>Você usará o sistema como:</label>
                <div class="role-group">
                    <label class="role-box">
                        <input type="radio" name="role" value="paciente" checked>
                        <span>
                            <strong style="display: block; font-size: 1.1rem; margin-bottom: 4px;">Paciente</strong>
                            <small style="font-weight: 500; opacity: 0.8; line-height: 1.2; display: block;">Vou gerenciar minha própria rotina de saúde</small>
                        </span>
                    </label>
                    <label class="role-box">
                        <input type="radio" name="role" value="cuidador">
                        <span>
                            <strong style="display: block; font-size: 1.1rem; margin-bottom: 4px;">Cuidador</strong>
                            <small style="font-weight: 500; opacity: 0.8; line-height: 1.2; display: block;">Vou ajudar e monitorar outra pessoa</small>
                        </span>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-large" style="margin-top: 1rem;">Criar Minha Conta</button>
        </form>

        <div class="auth-footer" style="text-align: center; margin-top: 2rem;">
            <p>Já possui acesso? <a href="login.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Faça login aqui</a></p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            
            const user = { nome, email, role };
            localStorage.setItem('lembremed_user', JSON.stringify(user));
            localStorage.setItem('lembremed_logged', 'true');
            
            window.location.href = '../index.html';
        });
    </script>
</body>
</html>
