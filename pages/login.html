<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LembreMED</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card animate-fade">
        <div class="auth-header">
            <h1>LembreMED</h1>
            <p>Seu assistente pessoal de saúde.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Sua senha segura" required>
            </div>

            <button type="submit" class="btn btn-primary btn-large" style="margin-top: 1rem;">Entrar na Conta</button>
        </form>

        <div class="auth-footer" style="text-align: center; margin-top: 2rem;">
            <p>Ainda não tem uma conta? <a href="cadastro.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Cadastre-se agora</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const savedUser = JSON.parse(localStorage.getItem('lembremed_user'));
            
            if (savedUser && savedUser.email === email) {
                localStorage.setItem('lembremed_logged', 'true');
                window.location.href = '../index.html';
            } else {
                alert('E-mail não encontrado ou senha incorreta.');
            }
        });
    </script>
</body>
</html>
