<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - LembreMED</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <a href="inicio.html" class="logo">LembreMED</a>
            <div class="user-info">
                <span id="userNameDisplay" style="font-weight: 600;">Carregando...</span>
                <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem;">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <nav class="sub-nav">
            <a href="inicio.html" class="sub-nav-btn active">Início</a>
            <a href="pacientes.html" class="sub-nav-btn">Pacientes</a>
            <a href="medicamentos.html" class="sub-nav-btn">Medicamentos</a>
            <a href="historico.html" class="sub-nav-btn">Histórico</a>
        </nav>

        <section id="caregiverDash" class="animate-fade">
            <div class="dashboard-grid">
                <div class="card chart-container">
                    <h3 style="font-size: 1rem; margin-bottom: 1rem;">Adesão Geral</h3>
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path id="adherenceCircle" class="circle primary" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="adherenceText">0%</text>
                    </svg>
                </div>
                <div id="caregiverNextDose" class="card" style="padding: 1.5rem;">
                    <!-- Populated by JS -->
                </div>
            </div>

            <div class="stats-row">
                <div class="card stat-card">
                    <span class="stat-value" id="statDoses">0</span>
                    <span class="stat-label">Doses Hoje</span>
                </div>
                <div class="card stat-card">
                    <span class="stat-value" id="statDelays" style="color: var(--alert);">0</span>
                    <span class="stat-label">Pendentes</span>
                </div>
            </div>

            <div class="card-title">
                <h3>Visão Geral dos Pacientes</h3>
            </div>
            <div id="patientListContainer" class="patient-grid"></div>
        </section>
    </main>

    <!-- Modals (Needed globally) -->
    <div id="patientDetailsModal" class="modal-overlay">
        <div class="modal" style="max-width: 650px;">
            <div class="modal-header">
                <h2 id="detName">Detalhes do Paciente</h2>
                <button class="close-modal" onclick="closeModal('patientDetailsModal')">&times;</button>
            </div>
            <div id="patientDetailsContent"></div>
            <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
                <button class="btn btn-outline" style="flex: 1;" onclick="closeModal('patientDetailsModal')">Fechar</button>
                <button id="btnDeletePatient" class="btn" style="flex: 1; background-color: #ff4d4d; color: white;">Excluir Paciente</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal" style="max-width: 400px; text-align: center; padding: 2rem;">
            <div style="font-size: 3.5rem; margin-bottom: 1rem;">⚠️</div>
            <h3 id="confirmTitle">Tem certeza?</h3>
            <p id="confirmMessage">Esta ação não pode ser desfeita.</p>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-outline" style="flex: 1;" onclick="closeModal('confirmModal')">Cancelar</button>
                <button id="btnConfirmAction" class="btn" style="flex: 1; background-color: #ff4d4d; color: white;">Sim, Excluir</button>
            </div>
        </div>
    </div>

    <div id="notificationContainer" class="notification-container"></div>
    <script src="../js/script.js"></script>
</body>
</html>
