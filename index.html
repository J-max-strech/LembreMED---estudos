<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LembreMED</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <a href="index.html" class="logo">LembreMED</a>
            <div class="user-info">
                <span id="userNameDisplay" style="font-weight: 600;">Carregando...</span>
                <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem;">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Patient View -->
        <section id="patientView" style="display: none;" class="animate-fade">
            <div id="nextDoseContainer">
                <!-- Will be populated by JS -->
            </div>

            <div class="card">
                <div class="card-title">
                    <h3>Minha Rotina de Hoje</h3>
                    <button class="btn btn-primary" onclick="openModal('medModal')">+ Adicionar</button>
                </div>
                <div id="medListContainer" class="med-list">
                    <!-- Will be populated by JS -->
                </div>
            </div>
        </section>

        <!-- Caregiver View -->
        <section id="caregiverView" style="display: none;" class="animate-fade">
            <nav class="sub-nav">
                <button class="sub-nav-btn active" onclick="switchCaregiverTab('dash')">Início</button>
                <button class="sub-nav-btn" onclick="switchCaregiverTab('patients')">Cadastro de Pacientes</button>
                <button class="sub-nav-btn" onclick="switchCaregiverTab('meds')">Cadastro de Medicamentos</button>
                <button class="sub-nav-btn" onclick="switchCaregiverTab('history')">Histórico</button>
            </nav>

            <!-- Caregiver Dashboard -->
            <div id="cg-tab-dash" class="cg-tab">
                <div class="dashboard-grid">
                    <div class="card chart-container">
                        <h3 style="font-size: 1rem; margin-bottom: 1rem;">Adesão Geral</h3>
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path id="adherenceCircle" class="circle primary" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage" id="adherenceText">0%</text>
                        </svg>
                    </div>
                    <div id="caregiverNextDose" class="card" style="padding: 1.5rem;">
                        <!-- Global next dose -->
                    </div>
                </div>

                <div class="stats-row">
                    <div class="card stat-card">
                        <span class="stat-value" id="statDoses">0</span>
                        <span class="stat-label">Doses Hoje</span>
                    </div>
                    <div class="card stat-card">
                        <span class="stat-value" id="statDelays" style="color: var(--alert);">0</span>
                        <span class="stat-label">Pendentes</span>
                    </div>
                </div>

                <div class="card-title">
                    <h3>Visão Geral dos Pacientes</h3>
                </div>
                <div id="patientListContainer" class="patient-grid"></div>
            </div>

            <!-- Caregiver Patient Registration -->
            <div id="cg-tab-patients" class="cg-tab" style="display: none;">
                <div class="card">
                    <div class="card-title"><h3>Cadastrar Novo Paciente</h3></div>
                    <form id="patientFormCaregiver">
                        <div class="grid-opcoes" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label for="pName">Nome Completo</label>
                                <input type="text" id="pName" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="pAge">Idade</label>
                                <input type="number" id="pAge" class="form-control" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="pCondition">Doença / Condição</label>
                            <input type="text" id="pCondition" class="form-control" placeholder="Ex: Hipertensão" required>
                        </div>
                        <div class="form-group">
                            <label for="pContact">Contato de Emergência</label>
                            <input type="text" id="pContact" class="form-control" placeholder="(00) 00000-0000" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-large">Salvar Paciente</button>
                    </form>
                </div>
            </div>

            <!-- Caregiver Medication Registration -->
            <div id="cg-tab-meds" class="cg-tab" style="display: none;">
                <div class="card">
                    <div class="card-title"><h3>Cadastrar Medicamento</h3></div>
                    <form id="medFormCaregiver">
                        <div class="form-group">
                            <label for="mPatient">Vincular ao Paciente</label>
                            <select id="mPatient" class="form-control" required>
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <div class="grid-opcoes" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label for="mName">Nome do Remédio</label>
                                <input type="text" id="mName" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="mDose">Dose (Ex: 500mg)</label>
                                <input type="text" id="mDose" class="form-control" required>
                            </div>
                        </div>
                        <div class="grid-opcoes" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label for="mTime">Horário</label>
                                <input type="time" id="mTime" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="mFreq">Frequência</label>
                                <select id="mFreq" class="form-control">
                                    <option value="Diário">Diário</option>
                                    <option value="2x ao dia">2x ao dia (12h em 12h)</option>
                                    <option value="3x ao dia">3x ao dia (8h em 8h)</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-large">Cadastrar Medicamento</button>
                    </form>
                </div>
            </div>

            <!-- Caregiver History -->
            <div id="cg-tab-history" class="cg-tab" style="display: none;">
                <div class="card">
                    <div class="card-title"><h3>Histórico de Medicações</h3></div>
                    <div id="historyListContainer" class="history-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal: Add Medication -->
    <div id="medModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Novo Medicamento</h2>
                <button class="close-modal" onclick="closeModal('medModal')">&times;</button>
            </div>
            <form id="medForm">
                <div class="form-group">
                    <label for="medName">Nome do Remédio</label>
                    <input type="text" id="medName" class="form-control" placeholder="Ex: Metformina" required>
                </div>
                <div class="form-group">
                    <label for="medType">Tipo</label>
                    <select id="medType" class="form-control">
                        <option value="Comprimido">Comprimido</option>
                        <option value="Gotas">Gotas</option>
                        <option value="Cápsula">Cápsula</option>
                        <option value="Injeção">Injeção</option>
                        <option value="Xarope">Xarope</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="medDose">Dose</label>
                    <input type="text" id="medDose" class="form-control" placeholder="Ex: 500mg" required>
                </div>
                <div class="form-group">
                    <label for="medTime">Horário</label>
                    <input type="time" id="medTime" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Salvar Medicamento</button>
            </form>
        </div>
    </div>

    <!-- Modal: Add Patient (Caregiver View) -->
    <div id="patientModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Novo Paciente</h2>
                <button class="close-modal" onclick="closeModal('patientModal')">&times;</button>
            </div>
            <form id="patientForm">
                <div class="form-group">
                    <label for="pName">Nome do Paciente</label>
                    <input type="text" id="pName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="pCondition">Condição / Doença</label>
                    <input type="text" id="pCondition" class="form-control" placeholder="Ex: Diabetes" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Adicionar Paciente</button>
            </form>
        </div>
    </div>

    <!-- Modal: Patient Details (Caregiver View) -->
    <div id="patientDetailsModal" class="modal-overlay">
        <div class="modal" style="max-width: 650px;">
            <div class="modal-header">
                <h2 id="detName">Detalhes do Paciente</h2>
                <button class="close-modal" onclick="closeModal('patientDetailsModal')">&times;</button>
            </div>
            <div id="patientDetailsContent">
                <!-- Populated by JS -->
            </div>
            <button class="btn btn-outline" style="width: 100%; margin-top: 1.5rem;" onclick="closeModal('patientDetailsModal')">Fechar</button>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer" class="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
